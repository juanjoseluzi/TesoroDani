<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pista</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    margin-top:80px;
    background:#fafafa;
}

#contenido{
    display:none;
}

input{
    padding:10px;
    font-size:18px;
}

button{
    padding:10px 20px;
    font-size:18px;
}
</style>

</head>

<body>

<h2>Hola HERMOSÍSIMA!!! Esta pista está protegida.</h2>

<p>Ingresá el código secreto.</p>

<input id="clave" type="password">

<button onclick="verificar()">Aceptar</button>

<div id="contenido">

<h2>¡Correcto!</h2>

<p style="font-size:28px; font-weight:bold; color:#1b5e20; margin-top:30px;">
La próxima pista es la arbolada.
</p>

</div>

<script>

function verificar(){

if(document.getElementById("clave").value=="2511"){

document.getElementById("contenido").style.display="block";

}else{

alert("Código incorrecto");

}

}

</script>

</body>

</html>
